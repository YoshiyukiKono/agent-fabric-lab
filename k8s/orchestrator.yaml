apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: agents
spec:
  replicas: 1
  selector: { matchLabels: { app: orchestrator } }
  template:
    metadata: { labels: { app: orchestrator } }
    spec:
      containers:
      - name: orchestrator
        image: agent-blueprint-orchestrator:local
        imagePullPolicy: IfNotPresent
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: agents
spec:
  type: NodePort
  selector: { app: orchestrator }
  ports:
  - port: 80
    targetPort: 8080
