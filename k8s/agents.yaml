apiVersion: apps/v1
kind: Deployment
metadata:
  name: researcher
  namespace: agents
spec:
  replicas: 1
  selector: { matchLabels: { app: researcher } }
  template:
    metadata: { labels: { app: researcher } }
    spec:
      containers:
      - name: researcher
        image: agent-blueprint-agent:local
        imagePullPolicy: IfNotPresent
        env:
        - { name: ROLE, value: researcher }
        - { name: MODEL, value: llama3.2:1b }
        - { name: OLLAMA_URL, value: "http://ollama:11434/api/generate" }
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: researcher
  namespace: agents
spec:
  selector: { app: researcher }
  ports: [{ port: 80, targetPort: 8080 }]
---
