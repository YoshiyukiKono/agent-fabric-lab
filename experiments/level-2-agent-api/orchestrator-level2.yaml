apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-app
  namespace: agents
data:
  server.py: |
    import json
    import urllib.request
    from http.server import BaseHTTPRequestHandler, HTTPServer

    AGENTS = [
        ("Researcher", "http://researcher/"),
        ("Architect", "http://architect/"),
        ("Reviewer", "http://reviewer/"),
    ]

    def get_json(url):
        with urllib.request.urlopen(url, timeout=3) as res:
            return json.loads(res.read().decode("utf-8"))

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            rows = []

            for name, url in AGENTS:
                try:
                    data = get_json(url)
                    status = data.get("status", "unknown")
                    role = data.get("role", "unknown")
                    rows.append(f"<tr><td>{name}</td><td>{role}</td><td>{status}</td></tr>")
                except Exception as e:
                    rows.append(f"<tr><td>{name}</td><td>error</td><td>{e}</td></tr>")

            body = f"""
            <!doctype html>
            <html>
            <head>
              <meta charset="utf-8">
              <title>Agent Orchestrator - Level 2</title>
              <style>
                body {{ font-family: sans-serif; margin: 40px; }}
                table {{ border-collapse: collapse; }}
                th, td {{ border: 1px solid #ccc; padding: 8px 12px; }}
                th {{ background: #f0f0f0; }}
              </style>
            </head>
            <body>
              <h1>Agent Orchestrator - Level 2</h1>
              <p>Orchestrator is calling agent services through Kubernetes DNS.</p>
              <table>
                <tr><th>Agent</th><th>Role</th><th>Status</th></tr>
                {''.join(rows)}
              </table>
            </body>
            </html>
            """.encode("utf-8")

            self.send_response(200)
            self.send_header("Content-Type", "text/html; charset=utf-8")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

    HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
      - name: orchestrator
        image: python:3.12-slim
        command: ["python", "/app/server.py"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: app
          mountPath: /app/server.py
          subPath: server.py
      volumes:
      - name: app
        configMap:
          name: orchestrator-app
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: agents
spec:
  type: ClusterIP
  selector:
    app: orchestrator
  ports:
  - port: 80
    targetPort: 8080
