apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator-service-discovery
  namespace: agents
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-service-discovery
  namespace: agents
subjects:
- kind: ServiceAccount
  name: orchestrator
  namespace: agents
roleRef:
  kind: Role
  name: orchestrator-service-discovery
  apiGroup: rbac.authorization.k8s.io
