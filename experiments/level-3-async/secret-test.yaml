apiVersion: v1
kind: Pod
metadata:
  name: secret-test
  namespace: agents
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: busybox
    command:
      - sh
      - -c
      - |
        echo ${OPENAI_API_KEY:0:10}
        sleep 5
    env:
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: openai-secret
          key: OPENAI_API_KEY
