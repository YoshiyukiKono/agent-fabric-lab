apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-app
  namespace: agents
data:
  server.py: |
    import json
    import urllib.parse
    import urllib.request
    from http.server import BaseHTTPRequestHandler, HTTPServer

    PIPELINE = [
        ("Researcher", "http://researcher/run"),
        ("Architect", "http://architect/run"),
        ("Reviewer", "http://reviewer/run"),
    ]

    def post_json(url, payload):
        data = json.dumps(payload).encode("utf-8")
        req = urllib.request.Request(
            url,
            data=data,
            headers={"Content-Type": "application/json"},
            method="POST",
        )
        with urllib.request.urlopen(req, timeout=5) as res:
            return json.loads(res.read().decode("utf-8"))

    def render(task="", outputs=None):
        outputs = outputs or []
        rows = ""
        for name, result in outputs:
            rows += f"""
            <tr>
              <td>{name}</td>
              <td><pre>{result.get('input', '')}</pre></td>
              <td><pre>{result.get('output', '')}</pre></td>
            </tr>
            """

        return f"""
        <!doctype html>
        <html>
        <head>
          <meta charset="utf-8">
          <title>Agent Orchestrator - Level 3A</title>
          <style>
            body {{ font-family: sans-serif; margin: 40px; }}
            textarea {{ width: 720px; height: 120px; }}
            table {{ border-collapse: collapse; margin-top: 24px; }}
            th, td {{ border: 1px solid #ccc; padding: 8px 12px; vertical-align: top; }}
            th {{ background: #f0f0f0; }}
            pre {{ white-space: pre-wrap; }}
          </style>
        </head>
        <body>
          <h1>Agent Orchestrator - Level 3A</h1>
          <p>Task pipeline: Researcher → Architect → Reviewer</p>

          <form method="POST" action="/run">
            <textarea name="task">{task}</textarea><br>
            <button type="submit">Run Agent Pipeline</button>
          </form>

          <table>
            <tr><th>Agent</th><th>Input</th><th>Output</th></tr>
            {rows}
          </table>
        </body>
        </html>
        """.encode("utf-8")

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            body = render()
            self.send_response(200)
            self.send_header("Content-Type", "text/html; charset=utf-8")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_POST(self):
            length = int(self.headers.get("Content-Length", 0))
            raw = self.rfile.read(length).decode("utf-8")
            params = urllib.parse.parse_qs(raw)
            task = params.get("task", [""])[0]

            current = task
            outputs = []

            for name, url in PIPELINE:
                result = post_json(url, {"task": current})
                outputs.append((name, result))
                current = result.get("output", current)

            body = render(task, outputs)
            self.send_response(200)
            self.send_header("Content-Type", "text/html; charset=utf-8")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

    HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
      - name: orchestrator
        image: python:3.12-slim
        command: ["python", "/app/server.py"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: app
          mountPath: /app/server.py
          subPath: server.py
      volumes:
      - name: app
        configMap:
          name: orchestrator-app
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: agents
spec:
  type: ClusterIP
  selector:
    app: orchestrator
  ports:
  - port: 80
    targetPort: 8080
