apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-page
  namespace: agents
data:
  index.html: |
    <!doctype html>
    <html>
    <head>
      <meta charset="utf-8">
      <title>Agent Orchestrator Mock</title>
    </head>
    <body>
      <h1>Agent Orchestrator Mock</h1>
      <p>Harvester → K3s → Traefik → Agent Organization</p>
      <ul>
        <li>Researcher: Running</li>
        <li>Architect: Running</li>
        <li>Reviewer: Running</li>
      </ul>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
      - name: orchestrator
        image: nginx
        ports:
        - containerPort: 80
        volumeMounts:
        - name: page
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
      volumes:
      - name: page
        configMap:
          name: orchestrator-page
