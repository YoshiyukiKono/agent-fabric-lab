apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator
  namespace: agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator-read
  namespace: agents
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-read
  namespace: agents
subjects:
- kind: ServiceAccount
  name: orchestrator
  namespace: agents
roleRef:
  kind: Role
  name: orchestrator-read
  apiGroup: rbac.authorization.k8s.io
