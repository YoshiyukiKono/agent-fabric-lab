apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-app
  namespace: agents
data:
  server.py: |
    import os
    import subprocess
    from http.server import BaseHTTPRequestHandler, HTTPServer

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            result = subprocess.run(
                ["kubectl", "get", "pods", "-n", "agents", "-o", "wide"],
                capture_output=True,
                text=True
            )
            body = f"""
            <html>
            <head><meta charset="utf-8"><title>Agent Orchestrator</title></head>
            <body>
              <h1>Agent Orchestrator Mock - Level 1</h1>
              <p>Live pod status from Kubernetes API</p>
              <pre>{result.stdout}</pre>
              <pre style="color:red;">{result.stderr}</pre>
            </body>
            </html>
            """.encode("utf-8")

            self.send_response(200)
            self.send_header("Content-Type", "text/html; charset=utf-8")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

    HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      serviceAccountName: orchestrator
      containers:
      - name: orchestrator
        image: python:3.12-slim
        command: ["/bin/sh", "-c"]
        args:
          - |
            apt-get update &&
            apt-get install -y curl ca-certificates &&
            curl -LO https://dl.k8s.io/release/v1.35.0/bin/linux/amd64/kubectl &&
            chmod +x kubectl &&
            mv kubectl /usr/local/bin/kubectl &&
            python /app/server.py
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: app
          mountPath: /app/server.py
          subPath: server.py
      volumes:
      - name: app
        configMap:
          name: orchestrator-app
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: agents
spec:
  type: ClusterIP
  selector:
    app: orchestrator
  ports:
  - port: 80
    targetPort: 8080
