apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      serviceAccountName: orchestrator
      containers:
      - name: orchestrator
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          while true; do
            {
              echo "HTTP/1.1 200 OK"
              echo "Content-Type: text/html; charset=utf-8"
              echo
              echo "<html><body>"
              echo "<h1>Agent Orchestrator Mock - Level 1</h1>"
              echo "<p>Live pod status from Kubernetes API</p>"
              echo "<pre>"
              kubectl get pods -n agents -o wide
              echo "</pre>"
              echo "</body></html>"
            } | nc -l -p 8080
          done
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: agents
spec:
  type: ClusterIP
  selector:
    app: orchestrator
  ports:
  - port: 80
    targetPort: 8080
